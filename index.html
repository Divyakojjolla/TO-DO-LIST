<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✨ Advanced To-Do List</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- animated background layers -->
  <div class="bg-anim">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <h1><span class="sparkle">✨</span> TO DO LIST</h1>

    <input type="text" id="taskInput" placeholder="Enter your task..." />
    <input type="date" id="dateInput" />

    <select id="priorityInput">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>

    <button id="addBtn" class="btn-primary">
      <span class="plus">+</span> Add Task
    </button>

    <input type="text" id="searchInput" placeholder="🔍  Search tasks..." />

    <div class="action-row">
      <button id="sortBtn" class="btn-secondary">Sort Priority</button>
      <button id="clearBtn" class="btn-secondary">Clear All</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
